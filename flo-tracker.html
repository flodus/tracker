<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap');
:root{

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:80px;overflow-x:hidden;font-size:14px;-webkit-font-smoothing:antialiased;}
#header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px 12px;box-shadow:var(--shadow);}
#header h1{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--orange);letter-spacing:2px;line-height:1;}
.hrow{display:flex;justify-content:space-between;align-items:flex-start;}
.cd-num{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--orange);line-height:1;text-align:right;}
.cd-lbl{font-size:9px;color:var(--dim);letter-spacing:1px;text-align:right;text-transform:uppercase;}
.pbar{height:4px;background:var(--card3);border-radius:2px;margin-top:10px;overflow:visible;position:relative;}
.pfill{height:100%;background:linear-gradient(90deg,var(--orange),var(--orangeL));border-radius:2px;transition:width 0.5s;}
.pjalon{position:absolute;top:-3px;width:10px;height:10px;border-radius:50%;border:2px solid var(--card);transform:translateX(-50%);cursor:pointer;z-index:1;}
.plbls{display:flex;justify-content:space-between;margin-top:4px;}
.plbls span{font-size:9px;color:var(--dim);text-transform:uppercase;}

.tb{flex:1;padding:12px 2px;font-size:9px;text-align:center;letter-spacing:0.3px;text-transform:uppercase;border:none;background:none;color:var(--dim);border-bottom:2px solid transparent;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:all 0.2s;}
.tb.on{color:var(--orange);border-bottom-color:var(--orange);}
.sec{padding:14px;display:none;}
.sec.on{display:block;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
.card-prog{background:linear-gradient(135deg,var(--orangePale),#fff);border:1px solid var(--orangeBorder);border-radius:12px;padding:14px;margin-bottom:12px;}

input[type=number],input[type=text],input[type=date],textarea,select{background:var(--card2);border:1.5px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;width:100%;outline:none;-webkit-appearance:none;transition:border-color 0.2s;}

.row{display:flex;gap:8px;margin-bottom:10px;}
.row>*{flex:1;}
.fl{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}

// Init depuis la dernière séance POMPES HC (source de vérité), puis avance si réussie
(function initPuProg(){
  const lastHC=[...HC_SESSIONS].reverse().find(s=>s.type==='POMPES'&&s.pumpData);
  let base={lvl:0,sem:0,day:0};
  if(lastHC?.pumpData){base={lvl:lastHC.pumpData.lvl||0,sem:lastHC.pumpData.sem||0,day:lastHC.pumpData.day||0};}
  // Vérifier si la dernière séance est réussie (total >= minimum)
  let succeeded=true;
  if(lastHC?.pumpData){
    const sets=PU_LEVELS[base.lvl]?.semaines[base.sem]?.[base.day]||[];
    const totMin=sets.reduce((a,b)=>a+b,0);
    const totDone=(lastHC.pumpData.counts||[]).reduce((a,b)=>a+b,0);
    succeeded=totDone>=totMin;
  }
  function nextPos(l,s,d){
    if(d<2)return{lvl:l,sem:s,day:d+1};
    else if(s===0)return{lvl:l,sem:1,day:0};
    else return l<PU_LEVELS.length-1?{lvl:l+1,sem:0,day:0}:{lvl:l,sem:0,day:0};
  }
  const next=succeeded?nextPos(base.lvl,base.sem,base.day):base;
  // Si raté : on force le même jour, localStorage ignoré
  if(!succeeded){PU.lvl=next.lvl;PU.sem=next.sem;PU.day=next.day;puSave();return;}
  try{
    const pp=localStorage.getItem('pu_prog');
    if(pp){
      const x=JSON.parse(pp);
      const hcIdx=next.lvl*6+next.sem*3+next.day;
      const lsIdx=(x.lvl||0)*6+(x.sem||0)*3+(x.day||0);
      if(lsIdx>hcIdx){PU.lvl=x.lvl||0;PU.sem=x.sem||0;PU.day=x.day||0;return;}
    }
  }catch{}
  PU.lvl=next.lvl;PU.sem=next.sem;PU.day=next.day;
})();
function puSets(){return PU_LEVELS[PU.lvl]?.semaines[PU.sem]?.[PU.day]||[];}
function puRest(){return PU_REST[PU.day]||60;}
function puSave(){try{localStorage.setItem('pu_prog',JSON.stringify({lvl:PU.lvl,sem:PU.sem,day:PU.day}));}catch{}}
function puNext(){
  if(PU.day<2)PU.day++;
  else if(PU.sem===0){PU.sem=1;PU.day=0;}
  else{if(PU.lvl<PU_LEVELS.length-1){PU.lvl++;PU.sem=0;PU.day=0;}else{PU.sem=0;PU.day=0;}}
  puSave();
}

function nextGoal(){
  const today=ts();
  const future=(D.goals||[]).filter(g=>g.date>=today&&!g.status);
  return future.sort((a,b)=>a.date.localeCompare(b.date))[0]||null;
}
function startDate(){return nextGoal()?.start||D.goals?.[0]?.start||'2026-06-01';}
function fmtShort(ds){const d=new Date(ds+'T12:00:00');return d.getDate()+' '+FR_M[d.getMonth()].slice(0,4);}
function renderHeader(){
  const today=new Date();const ng=nextGoal();
  if(!ng){$('cdnum').textContent='✓';$('hdr-obj').textContent='Tous les objectifs atteints 🏆';$('pfill').style.width='100%';return;}
  const target=new Date(ng.date+'T12:00:00');const start=new Date(ng.start+'T12:00:00');
  const diff=Math.max(0,Math.ceil((target-today)/86400000));
  const total=Math.ceil((target-start)/86400000)||1;
  const elapsed=Math.max(0,Math.ceil((today-start)/86400000));
  const pct=Math.min(100,Math.round(elapsed/total*100));
  $('cdnum').textContent=diff;$('pfill').style.width=pct+'%';$('plpct').textContent=pct+'%';
  $('pl1').textContent=fmtShort(ng.start);$('pl2').textContent=fmtShort(ng.date);
  $('hdr-obj').textContent='🎯 '+ng.label;
  $('hdr-prog').textContent='📋 '+progLabel()+' · changer ✎';
  const wrap=$('pjalons');wrap.innerHTML='';
  (D.goals||[]).forEach(g=>{
    const gd=new Date(g.date+'T12:00:00');
    const gPct=Math.min(100,Math.max(0,Math.round((gd-start)/(target-start)*100)));
    const color=g.status==='ok'?'var(--green)':g.status==='ko'?'var(--red)':'var(--purple)';
    const j=document.createElement('div');j.className='pjalon';j.style.left=gPct+'%';j.style.background=color;j.title=g.label;j.onclick=()=>{goTab(3);setTimeout(()=>switchRecap(2),50);};wrap.appendChild(j);
  });
}

// ══ MISSED / STREAK ═══════════════════════════
function missedCount(){
  const today=ts();const start=startDate();
  // Trouver la date de la dernière séance validée
  const allSess=(D.sessions||[]).filter(s=>s.done&&s.date<today).sort((a,b)=>b.date.localeCompare(a.date));
  if(!allSess.length)return 0;
  const lastDate=allSess[0].date;
  let count=0;
  let d=new Date(today+'T12:00:00');d.setDate(d.getDate()-1);
  while(true){
    const s=d.toISOString().split('T')[0];
    if(s<=lastDate||s<start)break;
    const p=curProg()[d.getDay()];
    if(p&&p.type!=='REPOS')count++;
    d.setDate(d.getDate()-1);
  }
  return count;
}
function calcStreak(){
  const today=ts();const start=startDate();
  const todaySess=(D.sessions||[]).find(x=>x.date===today&&x.done);
  const todayP=curProg()[new Date().getDay()];
  let streak=(todayP&&todayP.type!=='REPOS'&&todaySess)?1:0;
  let d=new Date(today+'T12:00:00');d.setDate(d.getDate()-1);
  for(let i=0;i<30;i++){
    const s=d.toISOString().split('T')[0];if(s<start)break;
    const p=curProg()[d.getDay()];
    const se=(D.sessions||[]).find(x=>x.date===s&&x.done);
    if(!p||p.type==='REPOS'){if(se&&se.type==='BONUS')streak++;d.setDate(d.getDate()-1);continue;}
    if(se)streak++;else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

// ══ HIIT MODULE ═══════════════════════════════
let HT={run:false,phase:'effort',round:1,left:45,eff:45,rst:15,rounds:10,custom:false,iv:null,done:false,yt:true,note:''};
function buildHiit(sess,failSess){
  return`<div class="card"><div class="ct">Séance HIIT</div>
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <button class="btn sm ${HT.yt?'':'dk'}" style="flex:1" onclick="HT.yt=true;renderHiit()">📺 YouTube</button>
      <button class="btn sm ${!HT.yt?'':'dk'}" style="flex:1" onclick="HT.yt=false;renderHiit()">⏱ Timer</button>
    </div>
    <div id="hiit-in"></div>
    <input type="text" id="hiit-note" placeholder="Note (ex: Tibo 15min...)" value="${HT.note}" oninput="HT.note=this.value" style="margin-top:10px;margin-bottom:10px">
    ${buildCheckBtns(sess,failSess,'HIIT')}</div>`;
}
function renderHiit(){
  const el=$('hiit-in');if(!el)return;
  if(HT.yt){el.innerHTML=`<div style="font-size:12px;color:var(--muted);padding:6px 0">Lance ta vidéo YouTube, reviens checker quand c'est fait.<br><span style="color:var(--dim)">Durée cible : 15-20 min</span></div>`;return;}
  if(HT.done){el.innerHTML=`<div class="done"><div class="di">🔥</div><div class="dt" style="color:var(--green)">TERMINÉ !</div><div class="ds">${HT.rounds} rounds</div><button class="btn dk" style="margin-top:12px" onclick="hiitReset()">Recommencer</button></div>`;return;}
  const pc=HT.phase==='effort'?'#e8622a':'#3a7bd5';
  const pd=HT.phase==='effort'?HT.eff:HT.rst;
  const pp=Math.min(100,Math.round(((pd-HT.left)/pd)*100));
  const tt=(HT.eff+HT.rst)*HT.rounds;
  const e2=(HT.round-1)*(HT.eff+HT.rst)+(HT.phase==='rest'?HT.eff:0)+(pd-HT.left);
  const tp=Math.min(100,Math.round(e2/tt*100));
  const rndCtrl=!HT.run?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;background:var(--card2);border-radius:8px;padding:8px 12px;border:1px solid var(--border)">
    <span style="font-size:10px;color:var(--muted);flex:1;font-weight:600">ROUNDS</span>
    <button class="btn dk sm" onclick="HT.rounds=Math.max(1,HT.rounds-1);renderHiit()">−</button>
    <span style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--orange);min-width:28px;text-align:center">${HT.rounds}</span>
    <button class="btn dk sm" onclick="HT.rounds++;renderHiit()">+</button>
  </div>`:'';
  const pre=!HT.run?`<div class="pbtns">
    <button class="btn sm ${HT.eff===45&&HT.rst===15&&!HT.custom?'':'dk'}" onclick="hiitPre(45,15)">45s/15s</button>
    <button class="btn sm ${HT.eff===30&&HT.rst===30&&!HT.custom?'':'dk'}" onclick="hiitPre(30,30)">30s/30s</button>
    <button class="btn sm ${HT.custom?'':'dk'}" onclick="HT.custom=true;renderHiit()">Custom</button>
  </div>${HT.custom?`<div class="cfields">
    <div><div class="fl">Effort(s)</div><input type="number" value="${HT.eff}" onchange="HT.eff=+this.value;HT.left=+this.value;renderHiit()"></div>
    <div><div class="fl">Repos(s)</div><input type="number" value="${HT.rst}" onchange="HT.rst=+this.value;renderHiit()"></div>
  </div>`:''}${rndCtrl}`:'';
  el.innerHTML=`${pre}<div class="tph" style="color:${pc}">${HT.phase==='effort'?'EFFORT':'REPOS'}</div>
    <div class="tbig" style="color:${pc}">${HT.left}</div>
    <div class="trnd">Round ${HT.round} / ${HT.rounds}</div>
    <div class="phbar"><div class="phfill" style="background:${pc};width:${pp}%"></div></div>
    <div class="totbar"><div class="totfill" style="width:${tp}%"></div></div>
    <div style="font-size:10px;color:var(--dim);text-align:center;margin-top:4px">${tp}%</div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn ${HT.run?'dk':''}" style="flex:2" onclick="hiitTog()">${HT.run?'PAUSE':'START'}</button>
      <button class="btn dk" style="flex:1" onclick="hiitReset()">RESET</button>
    </div>`;
}
function hiitTog(){
  HT.run=!HT.run;
  if(HT.run){HT.iv=setInterval(()=>{HT.left--;if(HT.left<=0){if(HT.phase==='effort'){HT.phase='rest';HT.left=HT.rst;}else{if(HT.round>=HT.rounds){clearInterval(HT.iv);HT.run=false;HT.done=true;logDone('HIIT',HT.note||`Timer ${HT.rounds} rounds`);}else{HT.round++;HT.phase='effort';HT.left=HT.eff;}}}renderHiit();},1000);}
  else clearInterval(HT.iv);renderHiit();
}
function hiitReset(){clearInterval(HT.iv);HT={...HT,run:false,phase:'effort',round:1,left:HT.eff,done:false,iv:null};renderHiit();}
function hiitPre(e,r){clearInterval(HT.iv);HT={...HT,eff:e,rst:r,run:false,phase:'effort',round:1,left:e,done:false,custom:false,iv:null};renderHiit();}

// ══ PUSHUP MODULE ═════════════════════════════

function renderPu(){
  const el=$('pu-in');if(!el)return;
  const sets=puSets();const target=sets[PU.set]||0;
  const totT=sets.reduce((a,b)=>a+b,0);const totD=PU.counts.reduce((a,b)=>a+b,0);
  const lvl=PU_LEVELS[PU.lvl];const dl=(PU.sem===0?['J1','J2','J3']:['J4','J5','J6'])[PU.day];

  }
  if(PU.rest){el.innerHTML=`<div style="text-align:center;padding:14px 0">

    const db=(PU.sem===0?['J1·60s','J2·90s','J3·120s']:['J4·60s','J5·90s','J6·120s']).map((l,i)=>`<button class="btn sm ${PU.day===i?'':'dk'}" onclick="PU.day=${i};renderPu()" style="flex:1;font-size:9px">${l}</button>`).join('');
    const ps=puSets();const cells=ps.map((n,i)=>`<div class="pcell"><div class="pn">${n}${i===ps.length-1?'+':''}</div><div class="pl">S${i+1}${i===ps.length-1?' MAX':''}</div></div>`).join('');
    el.innerHTML=`<div style="margin-bottom:8px"><div class="fl">NIVEAU</div><div style="display:flex;gap:4px">${lb}</div></div>
      <div style="margin-bottom:8px"><div class="fl" style="margin-top:6px">SEMAINE</div><div class="selrow">${sb}</div></div>

        <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:8px">Total min : ${ps.reduce((a,b)=>a+b,0)} · S5 = MAX</div>

      ${(()=>{const td=ts();const already=(D.sessions||[]).find(s=>s.date===td&&s.type==='POMPES'&&s.done);return already?`<div style="font-size:12px;color:var(--green);text-align:center;padding:8px">✓ Séance du jour déjà validée</div>`:`<button class="btn full" onclick="puGo()">Commencer ${dl}</button>`;})()}`;return;
  }
  const pct=Math.min(100,Math.round(PU.cnt/Math.max(target,1)*100));
  const prev=PU.counts.map((c,i)=>{const isL=i===sets.length-1;return`<span class="tag ${isL?'on':c>=sets[i]?'gn':'rd'}">${c}${isL?' MAX':'/'+sets[i]}</span>`;}).join('');
  el.innerHTML=`<div style="text-align:center;padding:8px 0">

function puStartCnt(){const sets=puSets();const isMax=PU.set===sets.length-1;PU.cnt=isMax?(sets[PU.set]||0):0;}
function puGo(){PU.set=0;PU.counts=[];PU.started=true;puStartCnt();renderPu();}
function puReset(){clearInterval(PU.ri);PU={...PU,set:0,counts:[],rest:false,rl:0,done:false,cnt:0,started:false};renderPu();}
function puSkip(){clearInterval(PU.ri);PU.rest=false;PU.rl=0;puStartCnt();renderPu();}
function puVal(){
  const sets=puSets();PU.counts.push(PU.cnt);
  if(PU.counts.length>=sets.length){
    PU.done=true;
    const tot=PU.counts.reduce((a,b)=>a+b,0);
    const totMin=sets.reduce((a,b)=>a+b,0);
    const dl=(PU.sem===0?['J1','J2','J3']:['J4','J5','J6'])[PU.day];
    logDone('POMPES',`${PU_LEVELS[PU.lvl]?.label} ${dl} · ${tot} pompes${tot<totMin?' (à refaire)':''}`);
    if(tot>=totMin)puNext(); // objectif atteint → jour suivant
    else puSave();           // objectif raté → on garde le même jour
  } else {
    PU.set++;PU.rest=true;PU.rl=puRest();clearInterval(PU.ri);
    PU.ri=setInterval(()=>{PU.rl--;if(PU.rl<=0){clearInterval(PU.ri);PU.rest=false;puStartCnt();}renderPu();},1000);

}

function wColor(){return'#5bb8f5';}
function fColor(){return'#f5c518';}
function addW(){
  const w=$('iw').value;if(!w)return;const f=$('if').value;
  const d=$('iw-date')?.value||ts();
  D.weighings=[...(D.weighings||[]).filter(x=>x.date!==d),{date:d,weight:parseFloat(w),fat:parseFloat(f)||null}].sort((a,b)=>a.date.localeCompare(b.date));
  sv();$('iw').value='';$('if').value='';if($('iw-date'))$('iw-date').value='';renderWeigh();
}
function delW(date){
  // Don't allow deleting hard-coded dates
  if(HC_WEIGHINGS.find(h=>h.date===date)){alert('Cette pesée est une donnée de référence, elle ne peut pas être supprimée.');return;}
  if(!confirm('Supprimer ?'))return;D.weighings=(D.weighings||[]).filter(w=>w.date!==date);sv();renderWeigh();
}
function renderWeigh(){
  const ws=D.weighings||[];
  if(ws.length===0){$('s1-list').innerHTML='<div class="empty">Aucune pesée.</div>';return;}
  const first=ws[0],last=ws[ws.length-1];
  const dw=(last.weight-first.weight).toFixed(1);const df=(last.fat&&first.fat)?(last.fat-first.fat).toFixed(1):null;
  let graph='';
  if(ws.length>=2){
    const W=ws.map(w=>w.weight);
    const Fw=ws.filter(w=>w.fat!=null);const F=Fw.map(w=>w.fat);
    const gW=280,pH=110,pad=28,gap=8,totalH=pH*2+gap;
    const xS=(gW-pad*2)/Math.max(ws.length-1,1);
    // Échelle : cibles en bas, valeurs actuelles vers le haut
    const minW=69,maxW=80,minF=9,maxF=26;
    // === POIDS ===
    const wPts=ws.map((w,i)=>({x:pad+i*xS,y:pad+(1-(w.weight-minW)/(maxW-minW))*(pH-pad*1.4),w:w.weight,date:w.date}));
    const wy74=pad+(1-(74-minW)/(maxW-minW))*(pH-pad*1.4);
    const wy70=pad+(1-(70-minW)/(maxW-minW))*(pH-pad*1.4);
    const bandW=`<rect x="${pad}" y="${Math.min(wy74,wy70)}" width="${gW-pad*2}" height="${Math.abs(wy70-wy74)}" fill="#5bb8f5" opacity="0.15" rx="2"/>`;
    let wLines='';for(let i=0;i<wPts.length-1;i++)wLines+=`<line x1="${wPts[i].x}" y1="${wPts[i].y}" x2="${wPts[i+1].x}" y2="${wPts[i+1].y}" stroke="#5bb8f5" stroke-width="2.5" stroke-linecap="round"/>`;
    const wDots=wPts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#5bb8f5" stroke="white" stroke-width="1.5"/><text x="${p.x}" y="${p.y-9}" text-anchor="middle" font-size="8" fill="#3a9fd5" font-weight="700">${p.w}</text>`).join('');
    const wyLbl=[80,74,70,69].map(v=>{const y=pad+(1-(v-minW)/(maxW-minW))*(pH-pad*1.4);return`<text x="${gW-pad+4}" y="${y+3}" text-anchor="start" font-size="7" fill="${v===74||v===70?'#5bb8f5':'#c0b8b0'}">${v}</text>`;}).join('');
    const wAxisLbl=`<text x="8" y="${pH/2}" text-anchor="middle" font-size="8" fill="#5bb8f5" font-weight="700" transform="rotate(-90,8,${pH/2})">kg</text>`;
    // === MG ===
    const fOffset=pH+gap;
    let fSvg='';
    if(F.length>=2){
      const fPts=Fw.map(w=>{const i=ws.indexOf(w);return{x:pad+i*xS,y:fOffset+pad+((w.fat-minF)/(maxF-minF))*(pH-pad*1.4),f:w.fat};});
      const fy14=fOffset+pad+((14-minF)/(maxF-minF))*(pH-pad*1.4);
      const fy10=fOffset+pad+((10-minF)/(maxF-minF))*(pH-pad*1.4);
      const bandF=`<rect x="${pad}" y="${Math.min(fy14,fy10)}" width="${gW-pad*2}" height="${Math.abs(fy10-fy14)}" fill="#3d9970" opacity="0.15" rx="2"/>`;
      let fLines='';for(let i=0;i<fPts.length-1;i++)fLines+=`<line x1="${fPts[i].x}" y1="${fPts[i].y}" x2="${fPts[i+1].x}" y2="${fPts[i+1].y}" stroke="#f5c518" stroke-width="2.5" stroke-linecap="round"/>`;
      const fDots=fPts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#f5c518" stroke="white" stroke-width="1.5"/><text x="${p.x}" y="${p.y+16}" text-anchor="middle" font-size="8" fill="#c9980a" font-weight="700">${p.f}%</text>`).join('');
      const fyLbl=[9,14,10,26].map(v=>{const y=fOffset+pad+((v-minF)/(maxF-minF))*(pH-pad*1.4);return`<text x="${gW-pad+4}" y="${y+3}" text-anchor="start" font-size="7" fill="${v===14||v===10?'#3d9970':'#c0b8b0'}">${v}%</text>`;}).join('');
      const fAxisLbl=`<text x="8" y="${fOffset+pH/2}" text-anchor="middle" font-size="8" fill="#d4960a" font-weight="700" transform="rotate(-90,8,${fOffset+pH/2})">%MG</text>`;
      const sep=`<line x1="${pad}" y1="${fOffset}" x2="${gW-pad}" y2="${fOffset}" stroke="#e8e4de" stroke-width="1"/>`;
      fSvg=sep+bandF+fLines+fDots+fyLbl+fAxisLbl;
    }
    const xL=wPts.map(p=>{const d=new Date(p.date+'T12:00:00');return`<text x="${p.x}" y="${totalH+14}" text-anchor="middle" font-size="7" fill="#a09890">${d.getDate()}/${d.getMonth()+1}</text>`;}).join('');
    const vLines=wPts.map(p=>`<line x1="${p.x}" y1="${pad/2}" x2="${p.x}" y2="${totalH}" stroke="#f0ede8" stroke-width="1" stroke-dasharray="3,3"/>`).join('');
    graph=`<div class="card"><div class="ct">Graphique</div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px">
        <span style="font-size:9px;color:#5bb8f5;font-weight:700">● Poids (kg)</span>
        ${F.length>=2?`<span style="font-size:9px;color:#d4960a;font-weight:700">● Masse grasse (%)</span>`:''}
        <span style="font-size:9px;color:#5bb8f5;opacity:0.6">■ cible 70-74 kg</span>
        ${F.length>=2?`<span style="font-size:9px;color:#3d9970;opacity:0.8">■ cible 10-14%</span>`:''}
      </div>
      <svg width="100%" viewBox="-12 0 ${gW+24} ${totalH+22}" style="display:block;overflow:hidden">
        ${vLines}${bandW}${wLines}${wDots}${wyLbl}${wAxisLbl}
        ${fSvg}${xL}
      </svg>
    </div>`;
  }
  const hist=`<div class="card"><div class="ct">Historique</div>${[...ws].reverse().map((w)=>{
    const mgKg=w.fat?(w.fat/100*w.weight).toFixed(1):null;const isHC=HC_WEIGHINGS.find(h=>h.date===w.date);
    return`<div class="li"><div><div class="ld">${w.date}${isHC?' · référence':''}</div>
      <div class="lv" style="color:${wColor()}">${w.weight} kg${w.fat?` · <span style="color:${fColor()}">${w.fat}% MG</span>`:''}</div>
      ${mgKg?`<div style="font-size:11px;color:var(--muted)">${mgKg} kg de masse grasse</div>`:''}</div>
      ${!isHC?`<button class="btn gh" onclick="delW('${w.date}')">✕</button>`:'<div style="width:30px"></div>'}</div>`;
  }).join('')}
  <div style="font-size:10px;color:var(--dim);margin-top:8px" class="${parseFloat(dw)<=0?'dg':'db'}">${parseFloat(dw)<=0?'▼':'▲'} ${Math.abs(dw)} kg${df?` · ${parseFloat(df)<=0?'▼':'▲'} ${Math.abs(df)}% MG`:''} depuis le début</div>
  </div>`;
  $('s1-list').innerHTML=graph+hist;
}

let calY=new Date().getFullYear(),calM=new Date().getMonth();
function calNav(d){calM+=d;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderRecapContent();}
function dayStatus(ds){
  const today=ts();const start=startDate();
  if(ds>today)return'fut';
  const p=curProg()[new Date(ds+'T12:00:00').getDay()];
  const sess=(D.sessions||[]).find(s=>s.date===ds&&s.done);
  if(!p||p.type==='REPOS'){return sess&&sess.type==='BONUS'?'dne':'rst';}
  if(ds<start)return'rst';
  if(sess)return'dne';if(ds<today)return'msd';return'today';
}
function renderRecapContent(){
  const el=$('s3-content');if(!el)return;
  if(curRecap===0)renderStats(el);
  else if(curRecap===1)renderCal(el);
  else if(curRecap===2)renderObjectifs(el);
  else renderJournal(el);
}
function renderStats(el){
  const today=ts();const start=startDate();
  // Streak
  const todaySess=(D.sessions||[]).find(x=>x.date===today&&x.done);
  const todayP=curProg()[new Date().getDay()];
  let streak=(todayP&&todayP.type!=='REPOS'&&todaySess)?1:0;
  let d=new Date(today+'T12:00:00');d.setDate(d.getDate()-1);
  for(let i=0;i<30;i++){const s=d.toISOString().split('T')[0];if(s<start)break;const p=curProg()[d.getDay()];const se=(D.sessions||[]).find(x=>x.date===s&&x.done);if(!p||p.type==='REPOS'){if(se&&se.type==='BONUS')streak++;d.setDate(d.getDate()-1);continue;}if(se)streak++;else break;d.setDate(d.getDate()-1);}
  let totD=0,totW=0;let cur=new Date(start+'T12:00:00');const td=new Date(today+'T12:00:00');
  while(cur<=td){const s=cur.toISOString().split('T')[0];const p=curProg()[cur.getDay()];if(p&&p.type!=='REPOS'){totW++;const se=(D.sessions||[]).find(x=>x.date===s&&x.done);if(se)totD++;}cur.setDate(cur.getDate()+1);}
  const dots=[];let dd=new Date(today+'T12:00:00');
  for(let i=0;i<14;i++){const s=dd.toISOString().split('T')[0];const st=dayStatus(s);const c=st==='dne'?'var(--green)':st==='msd'?'var(--red)':st==='rst'?'var(--border2)':st==='today'?'var(--orange)':'var(--card3)';dots.unshift(`<span class="sdot" style="background:${c}"></span>`);dd.setDate(dd.getDate()-1);}
  // Pompes
  const pumpSess=(D.sessions||[]).filter(s=>s.type==='POMPES'&&s.done&&s.pumpData).slice(-12);
  const cumul=(D.sessions||[]).filter(s=>s.type==='POMPES'&&s.done&&s.pumpData).reduce((sum,s)=>sum+s.pumpData.counts.reduce((a,b)=>a+b,0),0);
  let pGraph='';

    const tots=pumpSess.map(s=>s.pumpData.counts.reduce((a,b)=>a+b,0));const maxT=Math.max(...tots);
    const gW=260,gH=70,pad=22;const xS=(gW-pad*2)/Math.max(pumpSess.length-1,1);
    const pts=pumpSess.map((s,i)=>{const x=pad+i*xS;const y=gH-pad-((tots[i]/maxT))*(gH-pad*2);return{x,y,t:tots[i],date:s.date};});
    let lines='';for(let i=0;i<pts.length-1;i++){lines+=`<line x1="${pts[i].x}" y1="${pts[i].y}" x2="${pts[i+1].x}" y2="${pts[i+1].y}" stroke="var(--orange)" stroke-width="2.5" stroke-linecap="round"/>`;}
    const dSvg=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--orange)" stroke="white" stroke-width="1.5"/><text x="${p.x}" y="${p.y-9}" text-anchor="middle" font-size="9" fill="var(--orange)" font-weight="600">${p.t}</text>`).join('');
    const xL=pts.map(p=>{const d=new Date(p.date+'T12:00:00');return`<text x="${p.x}" y="${gH-4}" text-anchor="middle" font-size="7" fill="var(--dim)">${d.getDate()}/${d.getMonth()+1}</text>`;}).join('');
    pGraph=`<svg width="100%" viewBox="0 0 ${gW} ${gH}" style="overflow:visible"><line x1="${pad}" y1="${pad}" x2="${pad}" y2="${gH-pad}" stroke="var(--border2)" stroke-width="1"/><line x1="${pad}" y1="${gH-pad}" x2="${gW-pad}" y2="${gH-pad}" stroke="var(--border2)" stroke-width="1"/>${lines}${dSvg}${xL}</svg>`;
  }

  if(ws.length>=2){const f=ws[0],l=ws[ws.length-1];const dw=(l.weight-f.weight).toFixed(1);const df=(l.fat&&f.fat)?(l.fat-f.fat).toFixed(1):null;const mg0=f.fat?(f.fat/100*f.weight).toFixed(1):null;const mg1=l.fat?(l.fat/100*l.weight).toFixed(1):null;const dmg=(mg0&&mg1)?(mg1-mg0).toFixed(1):null;
    statHtml=`<div style="display:flex;gap:14px;flex-wrap:wrap">
      <div><div class="fl">Poids</div><div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:${parseFloat(dw)<=0?'var(--green)':'var(--red)'}">${parseFloat(dw)<=0?'▼':'▲'} ${Math.abs(dw)} kg</div></div>

      ${dmg?`<div><div class="fl">Masse grasse</div><div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:${parseFloat(dmg)<=0?'var(--green)':'var(--red)'}">${parseFloat(dmg)<=0?'▼':'▲'} ${Math.abs(dmg)} kg</div></div>`:''}
    </div><div style="margin-top:6px;font-size:10px;color:var(--dim)">${f.date} → ${l.date} · ${ws.length} pesées</div>`;}
  el.innerHTML=`<div class="card"><div style="display:flex;gap:16px;margin-bottom:12px">
    <div><div class="fl">Streak</div><div style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--orange)">${streak}<span style="font-size:14px"> j.</span></div></div>
    <div><div class="fl">Taux</div><div style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:${totW>0&&totD/totW>=0.8?'var(--green)':'var(--orange)'}">${totW>0?Math.round(totD/totW*100):0}<span style="font-size:14px">%</span></div></div>
    <div><div class="fl">Séances</div><div style="font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--text)">${totD}<span style="font-size:14px;color:var(--muted)">/${totW}</span></div></div>
  </div><div class="fl" style="margin-bottom:6px">14 derniers jours</div><div>${dots.join('')}</div></div>
  <div class="card"><div class="ct">Évolution poids</div>${statHtml}</div>

  });
  if(sess.length){
    html+=`<div class="msec" style="margin-top:10px"><div class="mst">SÉANCES</div>`;
    sess.forEach(s=>{
      html+=`<div style="font-size:13px;color:var(--muted);margin-bottom:6px">${s.type} ${s.done?'✓':'✗'}${s.note?' · '+s.note:''}${s.ts?' · '+s.ts:''}</div>`;
      if(s.pumpData?.counts){const badges=s.pumpData.counts.map((c,i)=>{const isL=i===s.pumpData.targets.length-1;return`<span class="tag ${isL?'on':c>=s.pumpData.targets[i]?'gn':'rd'}" style="font-size:9px">${c}${isL?' MAX':'/'+s.pumpData.targets[i]}</span>`;}).join('');html+=`<div style="margin-bottom:4px">${badges}</div>`;}
    });
    html+=`</div>`;
  }
  if(weigh){const mgKg=weigh.fat?(weigh.fat/100*weigh.weight).toFixed(1):null;html+=`<div class="msec"><div class="mst">PESÉE</div><div style="font-size:16px;font-weight:600">${weigh.weight} kg${weigh.fat?' · '+weigh.fat+'% MG':''}</div>${mgKg?`<div style="font-size:12px;color:var(--muted)">${mgKg} kg gras</div>`:''}</div>`;}
  else{html+=`<div class="msec"><div class="mst">AJOUTER PESÉE</div><div class="row"><input type="number" id="mw" placeholder="Poids (kg)" step="0.1"><input type="number" id="mf" placeholder="% MG" step="0.1"></div><button class="btn full" onclick="addWeighModal('${ds}')">Enregistrer</button></div>`;}
  html+=`<div class="msec"><div class="mst">JOURNAL</div>`;
  jEntries.forEach(j=>{html+=`<div style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:6px;padding:8px;background:var(--card2);border-radius:6px">${j.text}</div>`;});
  html+=`<textarea id="modal-j-text" placeholder="Ajouter une note..." style="margin-top:6px;min-height:60px"></textarea><button class="btn full" style="margin-top:8px" onclick="addJournalModal('${ds}')">Ajouter</button></div>`;
  if(!sess.length&&!weigh&&!jEntries.length&&!objsOnDay.length)html+=`<div style="font-size:13px;color:var(--dimmer);text-align:center;margin-top:8px">Aucune donnée ce jour.</div>`;
  openM(html);
}
function addWeighModal(date){
  const w=$('mw')?.value;if(!w)return;const f=$('mf')?.value;
  D.weighings=[...(D.weighings||[]).filter(x=>x.date!==date),{date,weight:parseFloat(w),fat:parseFloat(f)||null}].sort((a,b)=>a.date.localeCompare(b.date));
  sv();openDay(date);
}
function addJournalModal(date){
  const text=$('modal-j-text')?.value;if(!text)return;
  if(!D.journal)D.journal=[];D.journal.push({date,text,time:nowt()});sv();openDay(date);
}

// ══ RENDER ALL ════════════════════════════════
function renderAll(){
  renderHeader();
  if(curTab===0)renderToday();
  if(curTab===1)renderWeigh();
  if(curTab===2)renderSessContent();
  if(curTab===3)renderRecapContent();
}
renderAll();
</script>
</body>
</html>
